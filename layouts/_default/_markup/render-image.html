{{- if .IsBlock -}}
  <figure>
    <a href="{{ .Destination | safeURL }}" data-lightbox>
      <img src="{{ .Destination | safeURL }}"
        {{- with .Text }} alt="{{ . }}"{{ end -}}
        {{- with .Title }} title="{{ . }}"{{ end }}
        loading="lazy"
      >
    </a>
    {{- with .Title -}}
    <figcaption>{{ . }}</figcaption>
    {{- else with .Text -}}
    <figcaption>{{ . }}</figcaption>
    {{- end -}}
  </figure>
{{- else -}}
  <img src="{{ .Destination | safeURL }}"
    {{- with .Text }} alt="{{ . }}"{{ end -}}
    {{- with .Title }} title="{{ . }}"{{ end }}
    loading="lazy"
  >
{{- end -}}
